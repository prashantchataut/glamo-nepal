name = "glamo-nepal-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "KV"
id = "placeholder-replace-after-creating-namespace"
# NOTE: Before deploying, create a KV namespace with `wrangler kv namespace create RATE_LIMITS`
# and replace the id above with the returned namespace ID. Rate limiting will not persist without this.

[[r2_buckets]]
binding = "R2"
bucket_name = "glamo-nepal-assets"

[vars]
FRONTEND_URL = "http://localhost:3000"
FREE_SHIPPING_THRESHOLD = "2500"
COD_FEE = "50"
ADMIN_EMAIL = "admin@glamonepal.com"