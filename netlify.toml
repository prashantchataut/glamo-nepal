# ──────────────────────────────────────────────
# Netlify deployment configuration
# Single site: Next.js frontend + Hono backend API
# ──────────────────────────────────────────────
# IMPORTANT: NEXT_PUBLIC_* env vars must be set in the Netlify dashboard
# (Site settings > Environment variables) because Next.js inlines them
# at build time. Setting them only at runtime will NOT work.
#
# Required build-time env vars:
#   NEXT_PUBLIC_API_BASE_URL       — e.g. https://glamonepal.com/api/v1
#   NEXT_PUBLIC_SITE_URL           — e.g. https://glamonepal.com
#   NEXT_PUBLIC_FIREBASE_API_KEY
#   NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
#   NEXT_PUBLIC_FIREBASE_PROJECT_ID
#   NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
#   NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
#   NEXT_PUBLIC_FIREBASE_APP_ID
#   NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME
# ──────────────────────────────────────────────

[build]
  command = "pnpm build && cd backend && pnpm install"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[secrets_scan]
  enabled = false

[[secrets_scan.ignore]]
  pattern = "ADMIN_EMAIL"