# ──────────────────────────────────────────────
# Netlify deployment configuration
# ──────────────────────────────────────────────
# IMPORTANT: NEXT_PUBLIC_* env vars must be set in the Netlify dashboard
# (Site settings > Environment variables) because Next.js inlines them
# at build time. Setting them only at runtime will NOT work.
#
# Required build-time env vars:
#   NEXT_PUBLIC_CONVEX_URL       — Convex deployment URL (e.g. https://xxx.convex.cloud)
#   NEXT_PUBLIC_CONVEX_SITE_URL  — Convex site URL (e.g. https://xxx.convex.site)
#   NEXT_PUBLIC_SITE_URL         — Production site URL (e.g. https://glamonepal.com)
#
# The app handles missing NEXT_PUBLIC_CONVEX_URL gracefully during build
# (Convex features are disabled until the URL is available at runtime).
# ──────────────────────────────────────────────

[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[secrets_scan]
  omit_keys = ["NEXT_PUBLIC_INSTAGRAM_URL", "NEXT_PUBLIC_FACEBOOK_URL", "ADMIN_EMAIL"]