<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="100%" height="100%">
  <defs>
    <radialGradient id="promoDarkBg" cx="0.3" cy="0.5" r="0.8">
      <stop offset="0%" stop-color="#2D1040"/>
      <stop offset="50%" stop-color="#1A0A1E"/>
      <stop offset="100%" stop-color="#1A0A1E"/>
    </radialGradient>
    <radialGradient id="promoGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8B3A8F" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B3A8F" stop-opacity="0"/>
    </radialGradient>
    <filter id="promoBlur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="680" height="420" fill="url(#promoDarkBg)"/>

  <!-- Right side glow -->
  <ellipse cx="510" cy="210" rx="250" ry="250" fill="url(#promoGlow)" filter="url(#promoBlur)"/>

  <!-- Left side content area -->
  <!-- "LIMITED TIME" label with gold line -->
  <line x1="60" y1="80" x2="80" y2="80" stroke="#C9A84C" stroke-width="1"/>
  <text x="85" y="84" font-family="DM Sans, sans-serif" font-size="10" fill="#C9A84C" letter-spacing="3" font-weight="500">LIMITED TIME</text>

  <!-- "50%" main text -->
  <text x="60" y="200" font-family="Cormorant Garamond, Georgia, serif" font-size="96" fill="white" font-style="italic" font-weight="600">50%</text>

  <!-- "OFF SELECTED ITEMS" -->
  <text x="60" y="240" font-family="DM Sans, sans-serif" font-size="16" fill="#D4A0D7" letter-spacing="2" font-weight="400">OFF SELECTED ITEMS</text>

  <!-- "Clean. Vegan. Powerful." -->
  <text x="60" y="280" font-family="DM Sans, sans-serif" font-size="13" fill="#6B6B6B" font-weight="400">Clean. Vegan. Powerful.</text>

  <!-- CTA button outline -->
  <rect x="60" y="310" width="140" height="40" rx="20" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <text x="130" y="335" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="13" fill="#C9A84C" font-weight="500">Shop Now →</text>

  <!-- Right side decorative elements -->
  <!-- Floating gold circles -->
  <circle cx="520" cy="140" r="8" fill="#C9A84C" opacity="0.6"/>
  <circle cx="580" cy="240" r="12" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  <circle cx="480" cy="300" r="6" fill="#C9A84C" opacity="0.5"/>

  <!-- Gold arc -->
  <path d="M 420 80 A 200 200 0 0 1 620 380" fill="none" stroke="#C9A84C" stroke-width="0.75" opacity="0.2"/>
</svg>