<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="100%" height="100%">
  <defs>
    <linearGradient id="pouchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B3A8F"/>
      <stop offset="100%" stop-color="#6B2A6F"/>
    </linearGradient>
    <linearGradient id="mirrorGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8D5EA"/>
      <stop offset="100%" stop-color="#D4A0D7"/>
    </linearGradient>
    <linearGradient id="bottleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#D4A84C" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="puffGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7C5C0"/>
      <stop offset="100%" stop-color="#E8A5A0"/>
    </linearGradient>
    <radialGradient id="sparkle" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Cosmetic pouch -->
  <path d="M 160 280 Q 160 160 180 140 L 280 140 Q 300 160 300 280 Q 300 310 230 320 Q 160 310 160 280 Z" fill="url(#pouchGrad)"/>
  <!-- Pouch flap -->
  <path d="M 180 140 Q 230 120 280 140" fill="#7A3380" stroke="#9B4D9F" stroke-width="0.5"/>
  <!-- Pouch gold clasp -->
  <ellipse cx="230" cy="145" rx="12" ry="5" fill="#C9A84C" opacity="0.7"/>

  <!-- Spilled product — tall bottle -->
  <g transform="translate(80, 160) rotate(-15)">
    <rect x="0" y="0" width="22" height="70" rx="3" fill="#D4A0D7" opacity="0.7"/>
    <rect x="6" y="-10" width="10" height="14" rx="2" fill="#D4A0D7" opacity="0.8"/>
    <rect x="3" y="10" width="16" height="3" rx="1" fill="#C9A84C" opacity="0.5"/>
  </g>

  <!-- Spilled product — round jar -->
  <g transform="translate(120, 200)">
    <ellipse cx="20" cy="40" rx="25" ry="8" fill="#B8D4C8" opacity="0.4"/>
    <rect x="-5" y="10" width="50" height="30" rx="8" fill="#B8D4C8" opacity="0.6"/>
    <ellipse cx="20" cy="10" rx="25" ry="8" fill="#C8E4D8" opacity="0.7"/>
  </g>

  <!-- Hand mirror -->
  <g transform="translate(300, 100) rotate(20)">
    <!-- Mirror handle -->
    <rect x="28" y="70" width="8" height="40" rx="4" fill="#C9A84C" opacity="0.8"/>
    <!-- Mirror face -->
    <ellipse cx="32" cy="45" rx="35" ry="40" fill="url(#mirrorGrad)" stroke="#C9A84C" stroke-width="1.5"/>
    <!-- 404 reflection -->
    <text x="32" y="50" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="22" font-weight="700" font-style="italic" fill="#8B3A8F" opacity="0.8">404</text>
  </g>

  <!-- Makeup puff/sponge -->
  <g transform="translate(100, 260)">
    <ellipse cx="25" cy="15" rx="25" ry="18" fill="url(#puffGrad)" opacity="0.7"/>
    <ellipse cx="25" cy="10" rx="20" ry="12" fill="#F7C5C0" opacity="0.5"/>
  </g>

  <!-- Lipstick -->
  <g transform="translate(140, 230) rotate(-25)">
    <rect x="0" y="0" width="14" height="50" rx="2" fill="#8B3A8F" opacity="0.6"/>
    <path d="M 2 0 Q 7 -15 12 0" fill="#C9A84C" opacity="0.7"/>
  </g>

  <!-- Sparkle stars -->
  <g>
    <circle cx="350" cy="60" r="3" fill="url(#sparkle)"/>
    <circle cx="80" cy="120" r="2" fill="url(#sparkle)"/>
    <circle cx="400" cy="180" r="2.5" fill="url(#sparkle)"/>
    <circle cx="60" cy="300" r="2" fill="url(#sparkle)"/>
    <circle cx="420" cy="280" r="3" fill="url(#sparkle)"/>
    <circle cx="250" cy="50" r="2" fill="url(#sparkle)"/>
    <circle cx="380" cy="330" r="2.5" fill="url(#sparkle)"/>
  </g>

  <!-- Small sparkle crosses -->
  <g stroke="#C9A84C" stroke-width="1" opacity="0.5">
    <line x1="440" y1="100" x2="448" y2="100"/>
    <line x1="444" y1="96" x2="444" y2="104"/>
    <line x1="50" y1="180" x2="58" y2="180"/>
    <line x1="54" y1="176" x2="54" y2="184"/>
  </g>
</svg>