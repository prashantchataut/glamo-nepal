<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <pattern id="cardPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <!-- Subtle organic dot motif -->
      <circle cx="20" cy="20" r="1.2" fill="#8B3A8F" opacity="0.03"/>
      <circle cx="5" cy="5" r="0.8" fill="#8B3A8F" opacity="0.02"/>
      <circle cx="35" cy="35" r="0.8" fill="#8B3A8F" opacity="0.02"/>
      <!-- Tiny petal suggestion -->
      <path d="M 10 30 Q 12 28 14 30 Q 12 32 10 30 Z" fill="#8B3A8F" opacity="0.015"/>
    </pattern>
    <linearGradient id="hoverOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B3A8F" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#8B3A8F" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base warm blush -->
  <rect width="400" height="400" fill="#FDF6F9"/>

  <!-- Pattern overlay -->
  <rect width="400" height="400" fill="url(#cardPattern)"/>
</svg>