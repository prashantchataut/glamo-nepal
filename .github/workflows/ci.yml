name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # NOTE: `|| true` was previously appended, which silently swallowed
      # every vulnerability finding. We now let the audit fail the job at
      # moderate+ severity. If you need to temporarily downgrade, set the
      # `audit-level` input below to "high" instead of "moderate".
      - name: Frontend audit
        run: pnpm audit --audit-level=moderate
      - name: Backend audit
        run: cd backend && pnpm audit --audit-level=moderate

  frontend:
    name: Frontend - Lint, Typecheck, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit
      - run: pnpm run build

  backend:
    name: Backend - Typecheck, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit
      - run: pnpm test

  e2e-auth:
    name: E2E - Auth Flow
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build app
        run: pnpm run build
      - name: Run E2E auth tests
        run: npx playwright test e2e/auth.spec.ts --reporter=list
        env:
          NEXT_PUBLIC_API_BASE_URL: /api/v1
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

  e2e-guest-checkout:
    name: E2E - Guest Checkout Flow
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build app
        run: pnpm run build
      - name: Run E2E guest checkout tests
        run: npx playwright test e2e/guest-checkout.spec.ts --reporter=list
        env:
          NEXT_PUBLIC_API_BASE_URL: /api/v1

  e2e-security:
    name: E2E - Security Headers & Forms
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build app
        run: pnpm run build
      - name: Run E2E security tests
        run: npx playwright test e2e/security.spec.ts --reporter=list
        env:
          NEXT_PUBLIC_API_BASE_URL: /api/v1

  # ─── Backend deployment ────────────────────────────────────────────────────
  # The backend worker is deployed on every push to master after CI passes.
  # The frontend stays on Vercel with auto-deploy from the GitHub integration
  # (see docs/PLATFORM_DECISION.md for why we did NOT move the frontend to
  # Cloudflare Workers).
  deploy-backend:
    name: Deploy Backend to Cloudflare
    runs-on: ubuntu-latest
    needs: [backend, security-audit]
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend
      - name: Deploy backend worker
        run: pnpm run deploy 2>&1 | tee /tmp/wrangler-deploy.log
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Verify deployment health
        run: |
          echo "Waiting for worker to become available..."
          sleep 10
          # API_BASE_URL — set this in GitHub Secrets to your backend's
          # CUSTOM DOMAIN (e.g. https://api.glamonepal.com). Falls back to
          # the workers.dev URL for backward compatibility.
          HEALTH_URL="${{ secrets.BACKEND_HEALTH_URL || 'https://glamo-nepal-api.prashantchataut8.workers.dev/health' }}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health check failed: HTTP $HTTP_STATUS"
            curl -s "$HEALTH_URL" || echo "(unreachable)"
            exit 1
          fi
          echo "✅ Worker health check passed (HTTP 200)"
          echo "Response:"
          curl -s "$HEALTH_URL"
      - name: Verify integration secrets are present
        run: |
          INTEGRATIONS_URL="${{ secrets.BACKEND_INTEGRATIONS_URL || 'https://glamo-nepal-api.prashantchataut8.workers.dev/health/integrations' }}"
          RESP=$(curl -s "$INTEGRATIONS_URL")
          echo "$RESP"
          # Fail if any of the core secrets are missing.
          READY=$(echo "$RESP" | jq -r '.data.coreSecretsReady' 2>/dev/null || echo "false")
          if [ "$READY" != "true" ]; then
            echo "❌ Core secrets not ready. Check ADMIN_SESSION_SECRET, PROXY_TRUST_SECRET, CLOUDINARY_API_SECRET, RESEND_API_KEY on the worker."
            exit 1
          fi
          echo "✅ All core secrets present on worker."
      - name: Upload deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log
          path: /tmp/wrangler-deploy.log
          retention-days: 7
