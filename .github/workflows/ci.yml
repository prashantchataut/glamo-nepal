name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Frontend audit
        run: pnpm audit --audit-level=moderate || true
      - name: Backend audit
        run: cd backend && pnpm audit --audit-level=moderate || true

  frontend:
    name: Frontend - Lint, Typecheck, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit
      - run: pnpm run build

  backend:
    name: Backend - Typecheck, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit
      - run: pnpm test

  e2e-auth:
    name: E2E - Auth Flow
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build app
        run: pnpm run build
      - name: Run E2E auth tests
        run: npx playwright test e2e/auth.spec.ts --reporter=list
        env:
          NEXT_PUBLIC_API_BASE_URL: /api/v1
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

  e2e-guest-checkout:
    name: E2E - Guest Checkout Flow
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build app
        run: pnpm run build
      - name: Run E2E guest checkout tests
        run: npx playwright test e2e/guest-checkout.spec.ts --reporter=list
        env:
          NEXT_PUBLIC_API_BASE_URL: /api/v1

  e2e-security:
    name: E2E - Security Headers & Forms
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build app
        run: pnpm run build
      - name: Run E2E security tests
        run: npx playwright test e2e/security.spec.ts --reporter=list
        env:
          NEXT_PUBLIC_API_BASE_URL: /api/v1

  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: [frontend, backend, security-audit]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            backend/pnpm-lock.yaml
      # Frontend worker (glamo-nepal, OpenNext). `pnpm install` at the root
      # installs the frontend lockfile; the backend has its own lockfile.
      - run: pnpm install --frozen-lockfile
      - name: Build and deploy frontend worker (OpenNext)
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Backend worker (glamo-nepal-api, Hono). Install its lockfile, then
      # deploy with an explicit --config so wrangler does not walk up the tree
      # and pick up the root wrangler.jsonc (frontend) instead.
      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend
      - name: Deploy backend worker
        run: pnpm run deploy
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}